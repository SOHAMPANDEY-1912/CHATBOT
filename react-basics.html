<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>
    <!-- <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script> -->
    <!--  src attribute=load javascript from a file -->
    <!-- react is an external library, bunch of code that is outside our computer we can load this code on our website, and use it -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      // this line tells to translate the inside code into javascript

      const div = (
        <div>
             
          <button>hello</button>
           <p>paragraph of text {2 + 2}</p>   
        </div>
      );
      //   const button=document.createElement('button');
      //   button.innerHTML='Hello'; (use the DOM)
      const container = document.querySelector(".js-container");
      //   ReactDOM.createRoot(container).render('Welcome to SuperSimpleDev React Course');
      //   ReactDOM.createRoot(container).render(button);
      ReactDOM.createRoot(container).render(div);
      //   .render->to display something inside that container, we can display text and html elements inside this container as well
    </script>
  </body>
</html>
